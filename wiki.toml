# obsidian-llm-wiki (olw) configuration for the Trade For A Living vault.
# Docs: https://github.com/kytmanov/obsidian-llm-wiki-local
#
# OPTIONAL. By default Claude hand-processes dropped notes per the Ingest SOP in
# CLAUDE.md — this file is only used if you opt into the olw auto-compiler.
#
# This file is a manual template. Run `olw init --existing .` to have olw sync
# your global setup-wizard choices (provider, models) into it.

[models]
# Pick at `olw setup`, then re-run `olw init --existing .` to sync here.
# Minimal single-model setup: set heavy = fast (e.g. both "gemma4:e4b").
fast  = "gemma4:e4b"     # extraction, analysis, query routing (3-8B)
heavy = "qwen2.5:14b"    # article generation, Q&A answers (7B+)

# ── Local Ollama (default) ────────────────────────────────────────────────────
[ollama]
url       = "http://localhost:11434"   # LAN ok: http://192.168.1.x:11434
timeout   = 600
fast_ctx  = 16384   # context window for fast model (tokens)
heavy_ctx = 32768   # context window for heavy model (tokens)

# ── Alternative provider (uncomment to replace [ollama]) ──────────────────────
# [provider]
# name    = "groq"                          # lm_studio | vllm | together | azure | custom ...
# url     = "https://api.groq.com/openai/v1"
# timeout = 120
# fast_ctx  = 8192
# heavy_ctx = 32768
# azure_api_version = "2024-02-15-preview"  # Azure only

[pipeline]
auto_approve          = false   # true = skip draft review (publish directly)
auto_commit           = true    # git commit after each operation
auto_maintain         = false   # run maintain checks after each compile
max_concepts_per_source = 8     # cap concepts extracted per raw note
watch_debounce        = 3.0     # seconds after last file event before processing
ingest_parallel       = false   # parallel chunk analysis (needs OLLAMA_NUM_PARALLEL>=4)
# language = "en"               # ISO 639-1; unset = autodetect per note
# inline_source_citations = false
# source_citation_style = "legend-only"   # legend-only | inline-wikilink
# draft_media = "reference"               # reference | embed | omit
